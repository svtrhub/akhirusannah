<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akhirusannah 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:  #c9a96e;
      --ivory: #f5f0e8;
      --bg:    #0a0a0a;
    }

    html, body {
      width: 100%;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(201,169,110,0.045) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 5vw, 4rem) clamp(1rem, 4vw, 2rem);
      width: 100%;
      min-height: 100dvh;
      text-align: center;
    }
    .content-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: min(900px, 100%);
      margin: 0 auto;
    }

    .hero-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: clamp(0.85rem, 2.8vw, 1.35rem);
    }

    .hero-stack.blur-intro {
      filter: blur(14px);
      opacity: 0.42;
      transform: translateY(10px) scale(0.985);
      animation: sharpenIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      will-change: filter, opacity, transform;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin: 0;
    }
    .logo-wrap img {
      width: clamp(54px, 9.5vw, 90px);
      height: auto;
      display: block;
      /* No blend mode needed — bg is truly transparent now */
    }

    /* ── Title block ── */
    .title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.45rem, 1.2vw, 0.75rem);
      margin: 0;
      width: 100%;
    }
    .rule {
      width: clamp(32px, 6vw, 68px);
      height: 0.5px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }
    .title {
      font-family: 'Cinzel', Georgia, serif;
      font-weight: 300;
      font-size: clamp(0.78rem, 2.5vw, 1.35rem);
      letter-spacing: clamp(0.25em, 1.1vw, 0.48em);
      color: var(--gold);
      text-transform: uppercase;
      text-align: center;
      line-height: 1.3;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: clamp(0.55rem, 2.4vw, 2.75rem);
      width: 100%;
      max-width: 100%;
      margin: clamp(0.35rem, 1.8vw, 0.85rem) auto 0;
      padding: 0 clamp(0.25rem, 2vw, 0.5rem);
      opacity: 1;
      transform: none;
    }
    .countdown.reeling .digit {
      color: rgba(245, 240, 232, 0.92);
    }
    
    /* ── Social Links Section ── */
    .social-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.6rem, 1.5vw, 0.9rem);
      margin-top: clamp(1.2rem, 3vw, 2rem);
      width: 100%;
    }

    .social-label {
      font-family: 'Cinzel', Georgia, serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 1.3vw, 0.8rem);
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.75;
    }

    .social-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.8rem, 2vw, 1.2rem);
      flex-wrap: wrap;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: clamp(0.5rem, 1.5vw, 0.65rem) clamp(1rem, 2.5vw, 1.4rem);
      border: 1px solid rgba(201, 169, 110, 0.6);
      border-radius: 4px;
      background: rgba(201, 169, 110, 0.08);
      color: var(--ivory);
      font-family: 'Cinzel', serif;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .social-btn:hover,
    .social-btn:focus {
      background: rgba(201, 169, 110, 0.18);
      border-color: var(--gold);
      color: var(--gold);
      outline: none;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(201, 169, 110, 0.15);
    }

    .social-btn:active {
      transform: translateY(0);
    }

    .fullscreen-btn {
      position: fixed;
      bottom: clamp(0.85rem, 3vw, 1.5rem);
      left: clamp(0.85rem, 3vw, 1.5rem);
      margin: 0;
      z-index: 10;
      padding: 0.48rem 0.85rem;
      border: 1px solid rgba(201,169,110,0.65);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: rgba(245,240,232,0.88);
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      max-width: min(220px, 100%);
    }
    .fullscreen-btn:hover,
    .fullscreen-btn:focus {
      background: rgba(255,255,255,0.14);
      border-color: var(--gold);
      color: var(--ivory);
      outline: none;
      transform: translateY(-1px);
    }
    .fullscreen-btn:active { transform: translateY(0); }
    
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(0.35rem, 1vw, 0.55rem);
      min-width: clamp(3rem, 16vw, 5.5rem);
    }
    .digit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 12vw, 8rem);
      line-height: 1;
      color: var(--ivory);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      transition: opacity 0.16s ease, transform 0.12s ease, filter 0.12s ease;
      min-height: 1em;
    }
    .digit.flash { opacity: 0.32; }
    .digit.reel-tick {
      transform: translateY(-0.04em);
      filter: blur(0.4px);
    }
    .digit.reel-stop {
      animation: reelLand 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes reelLand {
      0%   { transform: translateY(-0.18em); filter: blur(1.2px); opacity: 0.55; }
      55%  { transform: translateY(0.03em); filter: blur(0); opacity: 1; }
      100% { transform: translateY(0); }
    }
    .label {
      font-family: 'Cinzel', serif;
      font-weight: 300;
      font-size: clamp(0.4rem, 1.2vw, 0.65rem);
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.65;
    }
    .sep {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 10.5vw, 6.5rem);
      line-height: 1;
      color: var(--gold);
      opacity: 0.28;
      padding-top: 0.04em;
      align-self: center;
      user-select: none;
    }

    @keyframes sharpenIn {
      to {
        filter: blur(0);
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-stack.blur-intro {
        animation: none;
        filter: none;
        opacity: 1;
        transform: none;
      }
      .social-btn {
        transition: none;
      }
    }

    @media (max-width: 520px) {
      .scene {
        padding: clamp(1.25rem, 4vw, 2rem) clamp(0.85rem, 3.5vw, 1.25rem);
        padding-bottom: clamp(4rem, 12vw, 5rem);
      }
      .hero-stack { gap: clamp(0.7rem, 3.5vw, 1.1rem); }
      .title-block { gap: clamp(0.4rem, 2vw, 0.65rem); }
      .title { letter-spacing: clamp(0.18em, 0.9vw, 0.32em); }
      .countdown {
        gap: clamp(0.4rem, 3.2vw, 0.8rem);
        margin-top: clamp(0.25rem, 1.5vw, 0.55rem);
      }
      .unit { min-width: clamp(2.5rem, 17vw, 3.2rem); }
      .digit { font-size: clamp(2.15rem, 13vw, 3.1rem); }
      .sep {
        font-size: clamp(1.75rem, 8.5vw, 2.3rem);
        padding-top: 0;
        align-self: center;
      }
      .label { font-size: clamp(0.38rem, 2.8vw, 0.52rem); }
      .social-section {
        margin-top: clamp(1rem, 2.5vw, 1.5rem);
        gap: clamp(0.5rem, 1.2vw, 0.7rem);
      }
      .social-buttons {
        gap: clamp(0.6rem, 1.5vw, 0.9rem);
      }
    }

    @media (max-width: 360px) {
      .sep { display: none; }
      .countdown { gap: 0.7rem; }
      .unit { min-width: 2.4rem; }
      .social-buttons {
        flex-direction: column;
        width: 100%;
      }
      .social-btn {
        width: 100%;
        max-width: 160px;
      }
    }

    @media (min-width: 900px) {
      .hero-stack { gap: clamp(1rem, 2.2vw, 1.5rem); }
      .countdown {
        gap: clamp(1.25rem, 2.8vw, 3rem);
        margin-top: clamp(0.5rem, 1.2vw, 1rem);
      }
      .social-section {
        margin-top: clamp(1.5rem, 3.5vw, 2.5rem);
      }
    }
  </style>
</head>
<body>
<div class="scene">

  <div class="content-wrap">
    <div class="hero-stack blur-intro" id="heroStack">

  <div class="logo-wrap">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAB9AAAAfQCAYAAACaOMR5AAEAAElEQVR42uz9d7gk530f+P6q3qruEybnnAcYDGYQBhjkHAmAAQQzGESRlESKQaJFi5aVLdmyZMuyfC3buw6brvfuXa/Xe4PXe9drWw6SbdE2qZw[...]
  </div>

    <div class="title-block">
      <div class="rule"></div>
      <h1 class="title">Akhirusannah 2026</h1>
      <div class="rule"></div>
    </div>

    <div class="countdown reeling" role="timer" aria-label="Hitung mundur Akhirusannah 2026" aria-live="polite">
    <div class="unit">
      <span class="digit" id="d">00</span>
      <span class="label">Hari</span>
    </div>
    <span class="sep" aria-hidden="true">&middot;</span>
    <div class="unit">
      <span class="digit" id="h">00</span>
      <span class="label">Jam</span>
    </div>
    <span class="sep" aria-hidden="true">&middot;</span>
    <div class="unit">
      <span class="digit" id="m">00</span>
      <span class="label">Menit</span>
    </div>
    <span class="sep" aria-hidden="true">&middot;</span>
    <div class="unit">
      <span class="digit" id="s">00</span>
      <span class="label">Detik</span>
    </div>
    </div>

    <!-- Social Section -->
    <div class="social-section">
      <p class="social-label">Update on the event</p>
      <div class="social-buttons">
        <a href="https://www.instagram.com/progresiftv/" target="_blank" rel="noopener noreferrer" class="social-btn">Instagram</a>
        <a href="https://www.youtube.com/c/ProgresifTV" target="_blank" rel="noopener noreferrer" class="social-btn">Youtube</a>
      </div>
    </div>

    </div>
  </div>

  <button class="fullscreen-btn" id="fullscreenBtn" type="button">Enter Full Screen</button>

</div>
<script>
  const TARGET = new Date('2026-06-10T19:00:00+07:00').getTime();
  const els = { d: document.getElementById('d'), h: document.getElementById('h'), m: document.getElementById('m'), s: document.getElementById('s') };
  const countdownEl = document.querySelector('.countdown');
  const heroStack = document.getElementById('heroStack');
  const BLUR_INTRO_MS = 1400;
  const fsBtn = document.getElementById('fullscreenBtn');
  const fullscreenEl = document.documentElement;
  const isInFullScreen = () => document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
  const updateFsLabel = () => {
    if (!fsBtn) return;
    fsBtn.textContent = isInFullScreen() ? 'Exit Full Screen' : 'Enter Full Screen';
  };
  const requestFs = () => {
    if (fullscreenEl.requestFullscreen) return fullscreenEl.requestFullscreen();
    if (fullscreenEl.webkitRequestFullscreen) return fullscreenEl.webkitRequestFullscreen();
    if (fullscreenEl.msRequestFullscreen) return fullscreenEl.msRequestFullscreen();
  };
  const exitFs = () => {
    if (document.exitFullscreen) return document.exitFullscreen();
    if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
    if (document.msExitFullscreen) return document.msExitFullscreen();
  };
  if (fsBtn) {
    fsBtn.addEventListener('click', () => {
      if (isInFullScreen()) exitFs();
      else requestFs();
    });
    document.addEventListener('fullscreenchange', updateFsLabel);
    document.addEventListener('webkitfullscreenchange', updateFsLabel);
    document.addEventListener('msfullscreenchange', updateFsLabel);
    updateFsLabel();
  }

  function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }
  function flash(el) {
    el.classList.add('flash');
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('flash')));
  }
  function getCountdownValues() {
    const diff = Math.max(0, TARGET - Date.now());
    return {
      d: pad(Math.floor(diff / 864e5)),
      h: pad(Math.floor((diff % 864e5) / 36e5)),
      m: pad(Math.floor((diff % 36e5) / 6e4)),
      s: pad(Math.floor((diff % 6e4) / 1e3)),
    };
  }
  function randomDigits() {
    return String(Math.floor(Math.random() * 100)).padStart(2, '0');
  }
  function reelTick(el, value, tickClass) {
    el.textContent = value;
    el.classList.remove('reel-tick');
    void el.offsetWidth;
    el.classList.add(tickClass);
  }

  let prev = { d: null, h: null, m: null, s: null };
  let liveTimer = null;

  function tick(live = true) {
    const cur = getCountdownValues();
    for (const k of ['d', 'h', 'm', 's']) {
      if (cur[k] !== prev[k]) {
        els[k].textContent = cur[k];
        if (live && prev[k] !== null) flash(els[k]);
        prev[k] = cur[k];
      }
    }
  }

  function startLiveCountdown() {
    tick(false);
    setTimeout(() => {
      tick();
      liveTimer = setInterval(tick, 1000);
    }, 1000 - (Date.now() % 1000));
  }

  function runReelIntro() {
    const keys = ['d', 'h', 'm', 's'];
    const finalValues = getCountdownValues();
    keys.forEach((k) => { els[k].textContent = '00'; });

    const phases = [
      { duration: 280, interval: 42 },
      { duration: 360, interval: 68 },
      { duration: 420, interval: 110 },
      { duration: 0, interval: 0 },
    ];

    let phaseIndex = 0;
    let phaseStart = performance.now();
    let lastStep = 0;

    const finishReel = () => {
      keys.forEach((k, i) => {
        setTimeout(() => {
          els[k].classList.remove('reel-tick');
          reelTick(els[k], finalValues[k], 'reel-stop');
          prev[k] = finalValues[k];
          els[k].addEventListener('animationend', () => els[k].classList.remove('reel-stop'), { once: true });
          if (i === keys.length - 1) {
            countdownEl.classList.remove('reeling');
            startLiveCountdown();
          }
        }, i * 120);
      });
    };

    const step = (now) => {
      const phase = phases[phaseIndex];
      if (!phase || phase.duration === 0) {
        finishReel();
        return;
      }

      if (now - phaseStart >= phase.duration) {
        phaseIndex += 1;
        phaseStart = now;
        lastStep = 0;
        requestAnimationFrame(step);
        return;
      }

      if (now - lastStep >= phase.interval) {
        lastStep = now;
        keys.forEach((k) => reelTick(els[k], randomDigits(), 'reel-tick'));
      }
      requestAnimationFrame(step);
    };

    requestAnimationFrame(step);
  }

  let reelStarted = false;
  function beginReelOnce() {
    if (reelStarted) return;
    reelStarted = true;
    if (heroStack) heroStack.classList.remove('blur-intro');
    runReelIntro();
  }

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (prefersReducedMotion) {
    beginReelOnce();
  } else if (heroStack) {
    heroStack.addEventListener('animationend', (e) => {
      if (e.animationName === 'sharpenIn') beginReelOnce();
    });
    setTimeout(beginReelOnce, BLUR_INTRO_MS + 80);
  } else {
    beginReelOnce();
  }
</script>
</body>
</html>
